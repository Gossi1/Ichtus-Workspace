<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ichtus Extensie</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #242440;
    --surface-hover: #2d2d50;
    --text: #e8e8f0;
    --text-dim: #9898b0;
    --accent: #f47920;
    --accent-glow: rgba(244, 121, 32, 0.25);
    --green: #34d399;
    --red: #f87171;
    --border: rgba(255,255,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    width: 400px;
    min-height: 340px;
    padding: 16px;
    font-size: 13px;
    line-height: 1.5;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .header .logo {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 14px;
    color: #fff;
    box-shadow: 0 0 12px var(--accent-glow);
  }

  .header h1 {
    font-size: 15px;
    font-weight: 700;
    flex: 1;
  }

  .header .version-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(255,255,255,0.06);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }

  .section {
    background: var(--surface);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    border: 1px solid var(--border);
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .status-dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); }
  .status-dot.warning { background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }

  .server-input-row {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }

  .server-input-row input {
    flex: 1;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 12px;
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    outline: none;
    transition: border-color 0.15s;
  }
  .server-input-row input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-glow);
  }
  .server-input-row input::placeholder {
    color: var(--text-dim);
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    background: var(--surface-hover);
    color: var(--text);
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.08);
    transform: translateY(-1px);
  }
  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent) 0%, #e06610 100%);
    border-color: rgba(244, 121, 32, 0.5);
    color: #fff;
    width: 100%;
    padding: 10px;
    font-size: 14px;
  }
  .btn-primary:hover:not(:disabled) {
    box-shadow: 0 4px 14px var(--accent-glow);
    border-color: var(--accent);
  }
  .btn-primary.pulling {
    background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
    border-color: rgba(59, 130, 246, 0.5);
  }

  .output-area {
    background: rgba(0,0,0,0.35);
    border-radius: 6px;
    padding: 10px;
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
    font-size: 11px;
    line-height: 1.6;
    color: #b0b0c8;
    max-height: 180px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-word;
    margin-top: 8px;
  }
  .output-area:empty {
    display: none;
  }
  .output-area .success { color: var(--green); }
  .output-area .error { color: var(--red); }

  .footer {
    text-align: center;
    font-size: 10px;
    color: var(--text-dim);
    padding-top: 6px;
  }
  .footer a {
    color: var(--accent);
    text-decoration: none;
  }

  .spacer { flex: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">I</div>
  <h1>Ichtus Extensie</h1>
  <span class="version-badge" id="ext-version">v1.2</span>
</div>

<div class="section">
  <div class="section-label">Status</div>
  <div class="status-row">
    <span class="status-dot" id="update-dot"></span>
    <span id="update-status">Controleren...</span>
  </div>
  <div class="status-row" style="margin-top:4px;">
    <span style="color:var(--text-dim);font-size:12px;">Server:</span>
    <span id="server-version" style="font-size:12px;">—</span>
  </div>
</div>

<div class="section">
  <div class="section-label">Git Pull</div>
  <div class="server-input-row">
    <input type="text" id="server-url" value="http://localhost:8080" placeholder="http://localhost:8080" spellcheck="false">
    <button class="btn" id="btn-test-server" title="Test verbinding">Test</button>
  </div>
  <button class="btn btn-primary" id="btn-git-pull">
    <span id="btn-icon">⬇</span>
    <span id="btn-text">Git Pull</span>
  </button>
  <div class="output-area" id="output-area"></div>
</div>

<div class="footer">
  <a href="#" id="open-releases">GitHub releases</a> · 
  <a href="#" id="open-chrome-ext">chrome://extensions</a>
</div>

<script src="popup.js"></script>
</body>
</html>
